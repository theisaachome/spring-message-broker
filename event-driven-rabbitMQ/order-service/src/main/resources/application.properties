spring.application.name=order-service
server.port=8082

# RabbitMQ connection
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Custom RabbitMQ properties
rabbitmq.queue.order.name=order
rabbitmq.exchange.order.name=order_exchange
rabbitmq.binding.order.name=order_binding
rabbitmq.routing.key.order.name=order_routing_key